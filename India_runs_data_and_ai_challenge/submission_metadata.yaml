ai_usage_summary: |
  Used Gemini for coding assistant pair-programming. No candidate data was sent to any external API.

methodology_summary: |
  Hybrid ranker: (1) a corpus-wide TF-IDF semantic layer scores every candidate's
  free text (headline, summary, role descriptions, skills) against JD-derived
  positive/negative reference documents, so plain-language "Tier 5" candidates
  who describe relevant work without JD buzzwords are still surfaced; (2) a
  rule-based layer scores experience band, title fit, keyword skill match,
  and career/company stability, and applies JD-explicit disqualifiers
  (consulting-only, pure-research-only, CV/speech/robotics-without-NLP,
  recent-LangChain-only AI experience, junior-title/seniority mismatch);
  (3) a multiplicative behavioral-signal modifier (recency, response rate,
  notice period, location/relocation fit); (4) an internal-consistency
  honeypot filter (impossible skill/duration combos, date/duration mismatches,
  YOE-vs-history mismatches) forces trap profiles to score 0. Honeypot rate
  in the top 100 is 0% (self-checked at ranking time). Runtime ~65s / ~3GB RAM
  for the full 100K pool on CPU, well inside the 5-min/16GB budget.

declarations:
